        init: function() {
            if (!audioCtx) {

            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().catch(()=>{});
            }
        },
        play: function(freq, type, duration, vol=0.1) {
            if (!audioCtx || audioCtx.state !== 'running') return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        },
        hover: function() { this.play(600, 'sine', 0.1, 0.05); },
        click: function() { this.play(400, 'square', 0.1, 0.1); },

    // ==========================================
    // 4. 儲存系統 (localStorage)
    // ==========================================
    const SAVE_KEY = "BianjingNursingGameSaveV4";

    function saveGame() {
        const d = { day: currentDay, P: P, Q: QPool, sn: selN, sf: selF, sc: selC, sb: selB };
        localStorage.setItem(SAVE_KEY, JSON.stringify(d));
        fTexts.push(new FloatingText(canvas.width / 2, 200, "【進度已儲存】", "#66ff66"));
        SE.save();
    }

    function loadGame() {
        const s = localStorage.getItem(SAVE_KEY);
        if (s) {
            try {
                const d = JSON.parse(s);
                currentDay = d.day; P = d.P; QPool = d.Q;
                selN = d.sn; selF = d.sf; selC = d.sc; selB = d.sb;
                isEarlyEnd = false; state = STATES.DAY_TRANSITION;
                SE.win(); return true;
            } catch (e) { return false; }
        }
        return false;
    }
    function hasS() { return localStorage.getItem(SAVE_KEY) !== null; }

    // ==========================================
    // 5. 遊戲邏輯與洗牌
    // ==========================================
    function shuf(a) { let i = a.length, r, t; while(i!==0) { r=Math.floor(Math.random()*i); i-=1; t=a[i]; a[i]=a[r]; a[r]=t; } return a; }

    function initG() {
        isEarlyEnd = false; earlyEndChar = ""; P.score = 50;
        for(let k in P.aff) { P.aff[k].c = 50; P.aff[k].t = 50; P.aff[k].s = "平淡"; }
        for(let k in QPool) {
            QPool[k].forEach(q => q.opts = shuf([...q.opts]));
            QPool[k] = shuf([...QPool[k]]);
        }
        day = 1; storyLine = 0; currentExpr = 'normal'; state = STATES.DAY_TRANSITION;
    }

    function checkEnd() { for(let k in P.aff) if(P.aff[k].t <= 10) { isEarlyEnd = true; earlyEndChar = k; return; } }

    function applyOpt(opt) {
        let oY = 250, hasP = false, hasN = false;
        P.score += opt.h; currentExpr = opt.ex;
        opt.af.forEach(r => {
            let tc = P.aff[r.c]; tc.t = Math.max(0, Math.min(tc.m, tc.t + r.v)); tc.s = r.s;
            let c = r.v >= 0 ? tc.col : "#94a1b2", s = r.v >= 0 ? "+" : "";
            fTexts.push(new FloatingText(canvas.width/2, oY, `${tc.n} ${s}${r.v}`, c)); oY -= 40;
            if(r.v > 0) { hasP = true; for(let i=0;i<20;i++) pts.push(new Conf(canvas.width/2,400,tc.col)); }
            else { hasN = true; for(let i=0;i<15;i++) pts.push(new DAura(canvas.width/2,400)); }
        });
        if(opt.af.length===0 && opt.h<0) { hasN = true; for(let i=0;i<15;i++) pts.push(new DAura(canvas.width/2,400)); }
        if(hasP) { flash.a=0.3; flash.c='#fff'; sfxs.push(new GRing(canvas.width/2,350)); }
        if(currentExpr==='angry' || currentExpr==='shocked') {
            if(hasN) { shake = 5; flash.a=0.2; flash.c='#ffaaaa'; sfxs.push(new RSlash(canvas.width/2,350)); }
        }
        checkEnd();
    }

    // ==========================================
    // 6. 輕量特效類別
    // ==========================================
    class Snow { constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height-canvas.height;this.s=Math.random()*3+1;this.vy=Math.random()*1+0.5;this.vx=(Math.random()-0.5)*0.5;this.a=Math.random()*0.5+0.3;} update(){this.y+=this.vy;this.x+=this.vx;if(this.y>canvas.height){this.y=-10;this.x=Math.random()*canvas.width;}} draw(ctx){ctx.save();ctx.fillStyle=`rgba(255,255,255,${this.a})`;ctx.beginPath();ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fill();ctx.restore();} }
    class Rain { constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height-canvas.height;this.vy=Math.random()*15+10;this.l=Math.random()*20+10;} update(){this.y+=this.vy;if(this.y>canvas.height){this.y=-20;this.x=Math.random()*canvas.width;}} draw(ctx){ctx.strokeStyle='rgba(150,180,220,0.4)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(this.x,this.y);ctx.lineTo(this.x-2,this.y+this.l);ctx.stroke();} }
    class Petal { constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height-canvas.height;this.vx=Math.random()*1+0.5;this.vy=Math.random()*1+1;this.s=Math.random()*5+3;this.ang=Math.random()*Math.PI*2;this.sp=Math.random()*0.05-0.025;} update(){this.x+=this.vx;this.y+=this.vy;this.ang+=this.sp;if(this.y>canvas.height){this.y=-10;this.x=Math.random()*canvas.width;}} draw(ctx){ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.ang);ctx.fillStyle='rgba(230,180,190,0.5)';ctx.beginPath();ctx.ellipse(0,0,this.s,this.s/2,0,0,Math.PI*2);ctx.fill();ctx.restore();} }
    class Conf { constructor(x,y,c){this.x=x;this.y=y;this.vx=(Math.random()-0.5)*16;this.vy=(Math.random()-1)*16-2;this.c=c||['#ff9999','#ffcc99','#99ccff','#ffcc00'][Math.floor(Math.random()*4)];this.l=1;this.w=Math.random()*Math.PI*2;this.ws=Math.random()*0.1+0.05;this.rot=Math.random()*Math.PI*2;this.rs=(Math.random()-0.5)*0.2;} update(){this.vx*=0.94;this.vy+=0.4;this.x+=this.vx+Math.sin(this.w)*2.5;this.y+=this.vy;this.w+=this.ws;this.rot+=this.rs;this.l-=0.015;} draw(ctx){ctx.save();ctx.globalAlpha=Math.max(0,this.l);ctx.translate(this.x,this.y);ctx.rotate(this.rot);ctx.fillStyle=this.c;ctx.fillRect(-6,-6,12,12);ctx.restore();} }

    class GRing { constructor(x,y){this.x=x;this.y=y;this.r=0;this.l=1;} update(){this.r+=(200-this.r)*0.15;this.l-=0.02;} draw(ctx){ctx.save();ctx.globalAlpha=Math.max(0,this.l);ctx.strokeStyle='#ffd700';ctx.lineWidth=10*this.l;ctx.shadowColor='#ffea00';ctx.shadowBlur=15;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.stroke();ctx.restore();} }
    class RSlash { constructor(x,y){this.x=x;this.y=y;this.l=1;this.p=0;} update(){this.p+=(1-this.p)*0.25;this.l-=0.025;} draw(ctx){ctx.save();ctx.globalAlpha=Math.max(0,this.l);ctx.translate(this.x,this.y);ctx.strokeStyle='#ffbbbb';ctx.lineWidth=20;ctx.lineCap='round';ctx.shadowColor='rgba(255,150,150,0.6)';ctx.shadowBlur=20;let len=100*this.p;ctx.beginPath();ctx.moveTo(-len,-len);ctx.lineTo(len,len);ctx.stroke();if(this.p>0.2){let len2=100*((this.p-0.2)/0.8);ctx.beginPath();ctx.moveTo(len2,-len2);ctx.lineTo(-len2,len2);ctx.stroke();}ctx.restore();} }

    function getLines(ctx, text, maxWidth) {
        if (!text) return [];
        let lines = [], paragraphs = text.split('\n');
        for (let p of paragraphs) {
            let line = '';
            for (let char of p) {
                let testLine = line + char;
                if (ctx.measureText(testLine).width > maxWidth && line.length > 0) {
                    lines.push(line); line = char;
                } else { line = testLine; }
            }
            if (line.length > 0 || paragraphs.length > 1) lines.push(line);
        }
        return lines;
    }

    function isHov(b) { return mouse.x>=b.x && mouse.x<=b.x+b.w && mouse.y>=b.y && mouse.y<=b.y+b.h; }
    
    function drawBtn(b, t, isS=false) {
        let h = isHov(b); 
        if(h && lastHover!==t){SE.hover(); lastHover=t;} else if(!h && lastHover===t){lastHover=null;}
        
        ctx.fillStyle=h?'#a6855b':'rgba(44,36,27,0.9)'; ctx.fillRect(b.x,b.y,b.w,b.h);
        ctx.strokeStyle=h?'#fff':'#cdae77'; ctx.lineWidth=isS?2:(h?3:2); ctx.strokeRect(b.x,b.y,b.w,b.h);
        ctx.fillStyle=h?'#fff':'#f4ebd0'; ctx.font=isS?'bold 24px Kaiti':'20px Kaiti'; ctx.textAlign='center'; ctx.textBaseline='middle';
        
        if(isS) {
            ctx.fillText(t,b.x+b.w/2,b.y+b.h/2); 
        } else { 
            let ls = getLines(ctx, t, b.w - 40); 
            let sy = b.y + b.h/2 - (ls.length-1)*13; 
            for(let i=0;i<ls.length;i++) ctx.fillText(ls[i], b.x+b.w/2, sy+i*26); 
        } 
        ctx.textBaseline='alphabetic';
    }

    function drawMap(z, rId) {
        let h = isHov(z); if(h&&lastHover!==z.n){SE.hover();lastHover=z.n;}else if(!h&&lastHover===z.n)lastHover=null;
        ctx.fillStyle=h?'rgba(100,70,50,0.9)':'rgba(44,36,27,0.85)'; ctx.fillRect(z.x,z.y,z.w,z.h);
        ctx.strokeStyle=h?'#fff':'#cdae77'; ctx.lineWidth=h?4:2; ctx.strokeRect(z.x,z.y,z.w,z.h);
        ctx.fillStyle=h?'#fff':'#ffdd66'; ctx.font='bold 32px Kaiti'; ctx.textAlign='center'; ctx.fillText(z.n,z.x+z.w/2,z.y+80);
        ctx.fillStyle='#f4ebd0'; ctx.font='22px Kaiti'; ctx.fillText(z.d,z.x+z.w/2,z.y+130);
        
        // 畫地圖小圖標
        let img = LImgs[rId] && LImgs[rId]['normal'];
        if(img && img.complete) {
            ctx.drawImage(img, 40, 30, 120, 120, z.x+z.w/2-40, z.y+110, 80, 80);
        }
    }

        ctx.fillStyle='rgba(44,36,27,0.95)'; ctx.fillRect(UI.box.x,UI.box.y,UI.box.w,UI.box.h);

    function getBg(l) {
        if(bgCvs[l]) return bgCvs[l]; let c=document.createElement('canvas'); c.width=800; c.height=900; let bx=c.getContext('2d');
        if(l.includes('臥房')||l.includes('正房')){ let g=bx.createLinearGradient(0,0,0,900); g.addColorStop(0,"#2a1e12"); g.addColorStop(1,"#1a0f0a"); bx.fillStyle=g; bx.fillRect(0,0,800,900); bx.fillStyle="rgba(255,200,100,0.05)"; bx.fillRect(50,50,700,800); bx.strokeStyle="#3a2a1a"; bx.lineWidth=4; for(let i=50;i<=750;i+=100){bx.beginPath();bx.moveTo(i,50);bx.lineTo(i,850);bx.stroke();} for(let j=50;j<=850;j+=100){bx.beginPath();bx.moveTo(50,j);bx.lineTo(750,j);bx.stroke();} }
        else if(l.includes('書閣')){ let g=bx.createLinearGradient(0,0,0,900); g.addColorStop(0,"#122a2a"); g.addColorStop(1,"#051a1a"); bx.fillStyle=g; bx.fillRect(0,0,800,900); bx.fillStyle="rgba(200,255,200,0.05)"; bx.fillRect(100,100,600,700); bx.strokeStyle="#050a0a"; bx.lineWidth=6; for(let i=100;i<=700;i+=40){bx.beginPath();bx.moveTo(100,i);bx.lineTo(700,i);bx.stroke();} }
        else if(l.includes('膳房')){ let g=bx.createLinearGradient(0,0,0,900); g.addColorStop(0,"#1a1a1a"); g.addColorStop(1,"#2a1515"); bx.fillStyle=g; bx.fillRect(0,0,800,900); let gl=bx.createRadialGradient(400,800,50,400,800,600); gl.addColorStop(0,"rgba(255,100,0,0.3)"); gl.addColorStop(1,"rgba(255,100,0,0)"); bx.fillStyle=gl; bx.fillRect(0,0,800,900); bx.fillStyle="#0a0505"; bx.fillRect(100, 700, 600, 200); }
        else if(l.includes('花園')){ let g=bx.createLinearGradient(0,0,0,900); g.addColorStop(0,"#080c1a"); g.addColorStop(1,"#1c2841"); bx.fillStyle=g; bx.fillRect(0,0,800,900); bx.fillStyle="rgba(255,255,230,0.8)"; bx.shadowColor="#ffea00"; bx.shadowBlur=60; bx.beginPath(); bx.arc(700,150,60,0,Math.PI*2); bx.fill(); bx.shadowBlur=0; bx.fillStyle="#050a14"; bx.beginPath(); bx.moveTo(0,900); bx.lineTo(0,600); bx.quadraticCurveTo(400,400,800,700); bx.lineTo(800,900); bx.fill(); }
        else{ let g=bx.createLinearGradient(0,0,0,900); g.addColorStop(0,"#1f1111"); g.addColorStop(1,"#3f1a1a"); bx.fillStyle=g; bx.fillRect(0,0,800,900); }
        bgCvs[l] = c; return c;
    }

    // --- 8. 遊戲迴圈與邏輯 ---
    function gameLoop(ts) {
        time = ts / 1000; ctx.save();
        if(shake>0) { ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake); shake*=0.85; if(shake<0.5) shake=0; }
        
        let dData = days[Math.min(day-1, days.length-1)], cLoc = dData.l, cWea = dData.w;
        if(state===STATES.END_ANIM || state===STATES.END) { cLoc = eType==='bad'?'避風暖閣':(eType==='good'?'侯府花園':'雅致書閣'); cWea = eType==='bad'?'rainy':(eType==='good'?'sunny':'cloudy'); }
        else if(state===STATES.CREATION) { cLoc = residences[selB]; }

        ctx.drawImage(getBg(cLoc), 0, 0);
        
        if(state!==STATES.START) {
            if(cWea==='sunny'){ ctx.fillStyle='rgba(255,200,100,0.1)'; ctx.fillRect(0,0,800,900); let g=ctx.createRadialGradient(800,0,50,800,0,600); g.addColorStop(0,'rgba(255,255,200,0.5)'); g.addColorStop(1,'rgba(255,200,100,0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(800,0,600,0,Math.PI*2); ctx.fill(); petals.forEach(p=>{p.update();p.draw(ctx);}); }
            else if(cWea==='rainy'){ ctx.fillStyle=`rgba(40,45,62,${eType==='bad'?0.5:0.3})`; ctx.fillRect(0,0,800,900); raindrops.forEach(r=>{r.update();r.draw(ctx);}); }
            else if(cWea==='snowy'){ ctx.fillStyle='rgba(15,22,42,0.3)'; ctx.fillRect(0,0,800,900); snowflakes.forEach(s=>{s.update();s.draw(ctx);}); }
            else { ctx.fillStyle=`rgba(70,75,88,${eType==='normal'?0.5:0.4})`; ctx.fillRect(0,0,800,900); ctx.fillStyle='rgba(230,230,230,0.05)'; ctx.beginPath(); ctx.arc(time*20%1000-100,100,150,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(time*15%1000+200,50,200,0,Math.PI*2); ctx.fill(); }
        }

        if(state===STATES.END_ANIM && eType==='bad') { ctx.fillStyle='rgba(255,230,230,0.15)'; ctx.fillRect(0,0,800,900); }
        if(state===STATES.END_ANIM && eType==='good' && Math.random()<0.15) pts.push(new Conf(400+(Math.random()-0.5)*400,50));

        ctx.strokeStyle='#8b6b4a'; ctx.lineWidth=4; ctx.strokeRect(20,20,760,860);

        if(state!==STATES.START && state!==STATES.CREATION && state!==STATES.END && state!==STATES.END_ANIM && state!==STATES.MAP) { drawDPnl(); drawSPnl(); }

        if(state===STATES.START) {
            ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,800,900); 
            ctx.fillStyle='#f4ebd0'; ctx.font='bold 56px Kaiti'; ctx.textAlign='center'; ctx.shadowColor='#000'; ctx.shadowBlur=15; ctx.fillText("汴京娘子調養記",400,250); 
            ctx.font='28px Kaiti'; ctx.fillText("— 終極衛教大作戰 (修復音效版) —",400,320); ctx.shadowBlur=0;
            drawBtn({x:300,y:450,w:200,h:60},"開始新局",true); if(hasS()) drawBtn({x:300,y:550,w:200,h:60},"延續前緣",true);
        } else if(state===STATES.CREATION) {
            ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,800,900); 
            ctx.fillStyle='#ffdd66'; ctx.font='bold 40px Kaiti'; ctx.textAlign='center'; ctx.fillText("【主母設定】",400,150);
            
            // 加入臉型與服飾選擇按鈕，使介面完整
            ctx.fillStyle='#f4ebd0'; ctx.font='28px Kaiti'; 
            ctx.fillText("名諱",200,300); drawBtn(UI.nL,"<",true); drawBtn(UI.nR,">",true); ctx.fillStyle='#cdae77'; ctx.font='32px Kaiti'; ctx.fillText(NList[selN],400,300);
            
            ctx.fillStyle='#f4ebd0'; ctx.font='28px Kaiti'; 
            ctx.fillText("出身",200,400); drawBtn(UI.rL,"<",true); drawBtn(UI.rR,">",true); ctx.fillStyle='#cdae77'; ctx.font='32px Kaiti'; ctx.fillText(BList[selB],400,400);
            
            ctx.fillStyle='#f4ebd0'; ctx.font='28px Kaiti'; 
            ctx.fillText("容貌",200,500); drawBtn(UI.fL,"<",true); drawBtn(UI.fR,">",true); ctx.fillStyle='#cdae77'; ctx.font='32px Kaiti'; ctx.fillText(faceNames[selF],400,500);
            
            ctx.fillStyle='#f4ebd0'; ctx.font='28px Kaiti'; 
            ctx.fillText("服飾",200,600); drawBtn(UI.cL,"<",true); drawBtn(UI.cR,">",true); ctx.fillStyle='#cdae77'; ctx.font='32px Kaiti'; ctx.fillText(clothNames[selC],400,600);

            drawBtn(UI.cfBtn,"踏入侯府",true);
            
            let img = LImgs[`player_${FList[selF]}_${CList[selC]}`]?.normal; if(img) { ctx.save(); ctx.translate(650,450); ctx.scale(1,1.3+Math.sin(time*2.5)*0.015); ctx.drawImage(img,-110,-140,220,280); ctx.restore(); }
        } else if(state===STATES.DAY_TRANSITION) {
            ctx.fillStyle='rgba(0,0,0,0.85)'; ctx.fillRect(0,0,800,900); 
            ctx.fillStyle='#cdae77'; ctx.font='bold 50px Kaiti'; ctx.textAlign='center'; ctx.fillText(`產後第 ${day} 天`,400,350);
            ctx.fillStyle='#f4ebd0'; ctx.font='26px Kaiti'; ctx.textAlign='left'; ctx.textBaseline='top'; 
            let lines = getLines(ctx, dData.e, 500); for(let i=0;i<lines.length;i++) ctx.fillText(lines[i],150,450+i*40); ctx.textBaseline='alphabetic';
            ctx.globalAlpha=(Math.sin(time*5)+1)/2*0.5+0.5; ctx.fillStyle='#cdae77'; ctx.font='22px Kaiti'; ctx.textAlign='center'; ctx.fillText("▼ 點擊開始調理 ▼",400,750); ctx.globalAlpha=1.0;
        } else if(state===STATES.MAP) {
            ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0,0,800,900); drawDPnl(); drawSPnl();
            ctx.fillStyle='#ffdd66'; ctx.font='bold 40px Kaiti'; ctx.textAlign='center'; ctx.fillText("【侯府地圖探索】",400,300); 
            ctx.fillStyle='#f4ebd0'; ctx.font='26px Kaiti'; ctx.fillText("今日趁著閒暇，夫人打算去哪裡走走？",400,360);
            drawMap(UI.maps.maid, 'maid'); drawMap(UI.maps.chef, 'chef'); drawMap(UI.maps.doc, 'doctor'); drawMap(UI.maps.med, 'medic');
        } else if(state===STATES.STORY || state===STATES.QUESTION || state===STATES.FEEDBACK) {
            if(state===STATES.STORY) { 
                let img = currentStage.img || 'baby';
                if(img === 'player') img = P.id;
                drawChar(img, rep(currentStage.char || '系統'), 'normal', Math.sin(time*3)*5);
                drawBox("【劇情與衛教】", rep(currentStage.s[storyLine])); 
            }
            else if(state===STATES.QUESTION) { 
                let img = currentStage.img || 'baby';
                if(img === 'player') img = P.id;
                drawChar(img, rep(currentStage.char || '系統'), 'normal', Math.sin(time*3)*5);
                drawBox(currentStage.q.includes("支線")?"【互動抉擇】":"【測驗：請夫人抉擇】", rep(currentStage.q), false); 
                currentStage.opts.forEach((o,i)=>drawBtn(UI.btns[i], "選項 "+(i+1)+"："+rep(o.t))); 
            }
            else { 
                let img = currentStage.img || 'baby';
                if(img === 'player') img = P.id;
                let ex = currentExpr === 'angry' ? 'normal' : currentExpr; // 防驚嚇處理
                drawChar(img, rep(currentStage.char || '系統'), ex, Math.sin(time*3)*5);
                drawBox("【情境發展】", rep(fbText)); 
            }
        } else if(state===STATES.END_ANIM) {
            let sc=endScenes[endIdx];
            let cN=sc.role==='baby'?'內心獨白':(P.aff[sc.role]?P.aff[sc.role].n:"未知");
            let img = sc.role;
            if(img === 'player') img = P.id;
            drawChar(img, cN, sc.expr, Math.sin(time*3)*5);
            drawBox(sc.n, sc.t);
        } else if(state===STATES.END) {
            let og=ctx.createLinearGradient(0,0,0,900); og.addColorStop(0,'rgba(0,0,0,0.55)'); og.addColorStop(0.5,'rgba(0,0,0,0.75)'); og.addColorStop(1,'rgba(0,0,0,0.95)'); ctx.fillStyle=og; ctx.fillRect(0,0,800,900);
            ctx.fillStyle=eColor; ctx.font='bold 48px Kaiti'; ctx.textAlign='center'; ctx.shadowColor='#000'; ctx.shadowBlur=15; ctx.fillText(eTitle,400,250);
            ctx.fillStyle='#fff'; ctx.font='26px Kaiti'; ctx.fillText("這段月子時光已落下帷幕...",400,330); ctx.shadowBlur=0;
            ctx.textAlign='left'; ctx.textBaseline='top'; 
            let lines = getLines(ctx, rep(endScenes[endScenes.length-1].t), 560);
            for(let i=0;i<lines.length;i++) ctx.fillText(lines[i],120,400+i*40); ctx.textBaseline='alphabetic';
            drawBtn({x:300,y:750,w:200,h:60},"重新挑戰",true);
        }

        pts=pts.filter(p=>p.l>0); pts.forEach(p=>{p.update();p.draw(ctx);});
        sfxs=sfxs.filter(e=>e.l>0); sfxs.forEach(e=>{e.update();e.draw(ctx);});
        fTexts=fTexts.filter(t=>t.l>0); fTexts.forEach(t=>{t.update();t.draw(ctx);});
        if(flash.a>0){ctx.fillStyle=flash.c; ctx.globalAlpha=flash.a; ctx.fillRect(0,0,800,900); ctx.globalAlpha=1.0; flash.a*=0.85;}
        ctx.restore(); requestAnimationFrame(gameLoop);
    }

    function updateMouse(cx, cy) {
        let r=canvas.getBoundingClientRect(); 
        mouse.x=(cx-r.left)*(800/r.width); 
        mouse.y=(cy-r.top)*(900/r.height);
    }

    function handleClick() {
        if(state===STATES.START) {
            if(isHov({x:300,y:450,w:200,h:60})) { SE.click(); state=STATES.CREATION; }
            if(hasS()&&isHov({x:300,y:550,w:200,h:60})) { SE.click(); if(load()) return; }
        } else if(state===STATES.CREATION) {
            if(isHov(UI.nL)){SE.click();selN=(selN-1+NList.length)%NList.length;} if(isHov(UI.nR)){SE.click();selN=(selN+1)%NList.length;}
            if(isHov(UI.rL)){SE.click();selB=(selB-1+BList.length)%BList.length;} if(isHov(UI.rR)){SE.click();selB=(selB+1)%BList.length;}
            if(isHov(UI.fL)){SE.click();selF=(selF-1+FList.length)%FList.length;} if(isHov(UI.fR)){SE.click();selF=(selF+1)%FList.length;}
            if(isHov(UI.cL)){SE.click();selC=(selC-1+CList.length)%CList.length;} if(isHov(UI.cR)){SE.click();selC=(selC+1)%CList.length;}
            if(isHov(UI.cfBtn)){SE.click();P.name=NList[selN]; P.id=`player_${FList[selF]}_${CList[selC]}`; P.origin=BList[selB]; P.residence=residences[selB]; initG();}
        } else if(state===STATES.DAY_TRANSITION) {
            SE.click();
            if(day===1) { currentStage=introStage; if(currentStage.opts) currentStage.opts=shuf(currentStage.opts); state=STATES.STORY; }
            else if(day===3) { currentStage=originStages[P.origin]; if(currentStage.opts) currentStage.opts=shuf(currentStage.opts); state=STATES.STORY; }
            else state=STATES.MAP;
        } else if(state===STATES.MAP) {
            let rId=null; if(isHov(UI.maps.maid)) rId='maid'; else if(isHov(UI.maps.chef)) rId='chef'; else if(isHov(UI.maps.doc)) rId='doctor'; else if(isHov(UI.maps.med)) rId='medic';
            if(rId){SE.click(); trigSummon(rId);}
        } else if(state===STATES.STORY) {
            SE.click(); storyLine++; if(storyLine>=currentStage.s.length) state=STATES.QUESTION;
        } else if(state===STATES.QUESTION) {
            for(let i=0;i<3;i++) {
                if(isHov(UI.btns[i])) {
                    let opt=currentStage.opts[i]; fbText=opt.fb; applyOpt(opt);
                    if(opt.h>0)SE.win(); else SE.fail(); state=STATES.FEEDBACK; break;
                }
            }
        } else if(state===STATES.FEEDBACK) {
            SE.click();
            if(isEarlyEnd){ genEnd(); state=STATES.END_ANIM; shake=25; flash.a=0.5; flash.c='#f00'; }
            else { day++; storyLine=0; currentExpr='normal'; save(); if(day>7){genEnd();state=STATES.END_ANIM;}else state=STATES.DAY_TRANSITION; }
        } else if(state===STATES.END_ANIM) {
            SE.click(); endIdx++;
            if(endIdx>=endScenes.length) { state=STATES.END; if(eType==='good'){flash.a=0.6;flash.c='#fff';} }
            else { let ex=endScenes[endIdx].expr; if(ex==='angry'){shake=10;flash.a=0.2;flash.c='#f00';} if(ex==='happy'){flash.a=0.2;flash.c='#fff';} }
        } else if(state===STATES.END) {
            if(isHov({x:300,y:750,w:200,h:60})) { SE.click(); state=STATES.START; }
        }
    }

    // 事件監聽：只在真實點擊時啟動音效，避免被瀏覽器阻擋
    canvas.addEventListener('mousedown', e => {
        SE.init();
        updateMouse(e.clientX, e.clientY);
        handleClick();
    });
    
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        SE.init();
        updateMouse(e.touches[0].clientX, e.touches[0].clientY);
        handleClick();
    }, {passive: false});
    
    canvas.addEventListener('mousemove', e => {
        updateMouse(e.clientX, e.clientY);
    });
    
    canvas.addEventListener('selectstart', e => e.preventDefault());
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
