<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汴京娘子調養記 - 終極衛教大作戰</title>
    <style>
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; background-color: #0b1021;
            font-family: 'Kaiti', '標楷體', serif; overflow: hidden; 
        }
        #game-container {
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        canvas {
            max-width: 100vw; max-height: 100vh; aspect-ratio: 8 / 9;
            background-color: #080c1a; box-shadow: 0 0 40px rgba(0,0,0,0.9);
            border: 4px solid #8b6b4a; border-radius: 8px;
            object-fit: contain; touch-action: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="900"></canvas>
</div>

<script>
    // ==========================================
    // 1. 音效引擎 (修復瀏覽器 Autoplay 阻擋)
    // ==========================================
    let audioCtx = null;
    const SE = {
        init: function() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) audioCtx = new AudioContext();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().catch(()=>{});
            }
        },
        playTone: function(freq, type, duration, vol=0.1) {
            if (!audioCtx || audioCtx.state !== 'running') return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        },
        hover: function() { this.playTone(600, 'sine', 0.1, 0.05); },
        click: function() { this.playTone(400, 'square', 0.1, 0.1); },
        win: function() {
            setTimeout(() => this.playTone(523.25, 'sine', 0.2, 0.1), 0);
            setTimeout(() => this.playTone(659.25, 'sine', 0.2, 0.1), 100);
            setTimeout(() => this.playTone(783.99, 'sine', 0.4, 0.1), 200);
        },
        fail: function() {
            setTimeout(() => this.playTone(200, 'sawtooth', 0.3, 0.1), 0);
            setTimeout(() => this.playTone(150, 'sawtooth', 0.4, 0.1), 150);
        },
        save: function() {
            setTimeout(() => this.playTone(880, 'sine', 0.1, 0.05), 0);
            setTimeout(() => this.playTone(1760, 'sine', 0.3, 0.05), 100);
        }
    };

    // ==========================================
    // 2. 系統變數與設定
    // ==========================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const STATES = { START: 0, CREATION: 1, DAY_TRANSITION: 2, MAP_EXPLORE: 3, STORY: 4, QUESTION: 5, FEEDBACK: 6, ENDING_ANIMATION: 7, END: 8 };
    let currentState = STATES.START;
    let currentDay = 1, currentStage = null, currentStoryLine = 0, selectedOptionFeedback = "", time = 0;
    let mouse = {x: -100, y: -100}, lastHoveredBtn = null, currentExpr = 'normal', shakeAmount = 0;
    let flashAlpha = 0, flashColor = '#ffffff';
    let particles = [], floatingTexts = [], specialEffects = [], bgCanvases = {};
    let isEarlyGameOver = false, earlyGameOverCharId = "", endingScenes = [], currentEndingSceneIndex = 0;
    let finalEndingTitle = "", finalEndingColor = "", endingType = "normal";

    const namesList = ['盛明蘭','沈珍珠','王語嫣','趙盼兒','李清照'], faceKeys = ['f1','f2','f3'], clothKeys = ['c1','c2','c3'], backgrounds = ['名門嫡女','書香世家','富商巨賈'], residences = ['華麗正房', '雅致書閣', '繁華暖閣'];
    let selectedNameIndex = 0, selectedFaceIndex = 0, selectedClothIndex = 0, selectedResIndex = 0;
    
    let player = {
        name: "主母夫人", origin: "名門嫡女", avatarId: "player_f1_c1", knowledgeScore: 50, residence: "華麗正房",
        affections: {
            maid: { name: "丫鬟 春桃", current: 50, target: 50, max: 100, color: "#e8b4b8", status: "平淡" },
            chef: { name: "膳房 總管", current: 50, target: 50, max: 100, color: "#8c7a6b", status: "平淡" },
            doctor: { name: "太醫 張大人", current: 50, target: 50, max: 100, color: "#3a4f41", status: "平淡" },
            medic: { name: "醫女 蘇氏", current: 50, target: 50, max: 100, color: "#8caeb8", status: "平淡" }
        }
    };

    const daysData = [
        { d: "產後第一天", w: "sunny", l: "主母臥房", e: "初為人母，您抱著剛出生的孩兒，心中充滿溫暖。大宋的陽光和煦，是個好兆頭。" },
        { d: "產後第二天", w: "cloudy", l: "侯府花園", e: "天色微陰。小少爺的哭聲劃破了寧靜，新手母親與下人們共同努力照護。" },
        { d: "產後第三天", w: "rainy", l: "侯府正廳", e: "窗外下起淅瀝小雨。今日似乎有來自府外或長輩的特別關切與愛護。" }, 
        { d: "產後第四天", w: "snowy", l: "主母臥房", e: "氣溫驟降，飛雪連天。隨著奶水自然分泌，您的雙乳感到沉重與奇妙的變化。" },
        { d: "產後第五天", w: "sunny", l: "膳房外廂", e: "大雪初霽。看著寶寶喝奶，大家都在為夫人的發奶膳食出謀劃策。" },
        { d: "產後第六天", w: "cloudy", l: "主母臥房", e: "夜裡微風徐徐。寶寶頻繁的需要考驗著您的溫柔與耐性。" },
        { d: "產後第七天", w: "sunny", l: "侯府花園", e: "轉眼已至第七日，您在大家的陪伴下，順利完成了初期的調養適應。" }
    ];

    let questionPools = { maid: [], chef: [], doctor: [], medic: [] };

    // ==========================================
    // 3. 儲存與讀取系統 (localStorage)
    // ==========================================
    const SAVE_KEY = "BianjingNursingGameSaveV6";

    function saveGame() {
        const saveData = {
            currentDay, player, questionPools,
            selectedNameIndex, selectedFaceIndex, selectedClothIndex, selectedResIndex
        };
        localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
        floatingTexts.push(new FloatingText(canvas.width / 2, 200, "【進度已儲存】", "#66ff66"));
        SoundEngine.save();
    }

    function loadGame() {
        const savedStr = localStorage.getItem(SAVE_KEY);
        if (savedStr) {
            try {
                const data = JSON.parse(savedStr);
                currentDay = data.currentDay; player = data.player; questionPools = data.questionPools;
                selectedNameIndex = data.selectedNameIndex; selectedFaceIndex = data.selectedFaceIndex;
                selectedClothIndex = data.selectedClothIndex; selectedResIndex = data.selectedResIndex;
                isEarlyGameOver = false; currentState = STATES.DAY_TRANSITION;
                SoundEngine.win(); return true;
            } catch (e) { return false; }
        }
        return false;
    }

    function hasSaveGame() { return localStorage.getItem(SAVE_KEY) !== null; }

    // ==========================================
    // 4. 物理特效與天氣粒子類別
    // ==========================================
    class Snowflake {
        constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height - canvas.height; this.size = Math.random() * 3 + 1; this.speedY = Math.random() * 1 + 0.5; this.speedX = (Math.random() - 0.5) * 0.5; this.opacity = Math.random() * 0.5 + 0.3; }
        update() { this.y += this.speedY; this.x += this.speedX; if (this.y > canvas.height) { this.y = -10; this.x = Math.random() * canvas.width; } }
        draw(ctx) { ctx.save(); ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
    }

    class Raindrop {
        constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height - canvas.height; this.speed = Math.random() * 15 + 10; this.length = Math.random() * 20 + 10; }
        update() { this.y += this.speed; if (this.y > canvas.height) { this.y = -20; this.x = Math.random() * canvas.width; } }
        draw(ctx) { ctx.strokeStyle = 'rgba(150, 180, 220, 0.4)'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(this.x - 2, this.y + this.length); ctx.stroke(); }
    }

    class Petal {
        constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height - canvas.height; this.vx = Math.random() * 1 + 0.5; this.vy = Math.random() * 1 + 1; this.size = Math.random() * 5 + 3; this.angle = Math.random() * Math.PI * 2; this.spin = Math.random() * 0.05 - 0.025; }
        update() { this.x += this.vx; this.y += this.vy; this.angle += this.spin; if (this.y > canvas.height) { this.y = -10; this.x = Math.random() * canvas.width; } }
        draw(ctx) { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle); ctx.fillStyle = 'rgba(230, 180, 190, 0.5)'; ctx.beginPath(); ctx.ellipse(0, 0, this.size, this.size / 2, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
    }

    class Confetti {
        constructor(x, y, colorCode) { this.x = x; this.y = y; this.vx = (Math.random() - 0.5) * 16; this.vy = (Math.random() - 1) * 16 - 2; this.color = colorCode || ['#cc4444', '#44cc44', '#4488cc', '#eebb44'][Math.floor(Math.random() * 4)]; this.life = 1.0; this.wobble = Math.random() * Math.PI * 2; this.wobbleSpeed = Math.random() * 0.1 + 0.05; this.rotation = Math.random() * Math.PI * 2; this.rotSpeed = (Math.random() - 0.5) * 0.2; }
        update() { this.vx *= 0.94; this.vy += 0.4; this.x += this.vx + Math.sin(this.wobble) * 2.5; this.y += this.vy; this.wobble += this.wobbleSpeed; this.rotation += this.rotSpeed; this.life -= 0.015; }
        draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.fillStyle = this.color; ctx.fillRect(-6, -6, 12, 12); ctx.restore(); }
    }

    class DarkAura {
        constructor(x, y) { this.x = x; this.y = y; this.vx = (Math.random() - 0.5) * 12; this.vy = (Math.random() - 0.5) * 12 - 2; this.size = Math.random() * 15 + 5; this.life = 1.0; }
        update() { this.x += this.vx; this.y += this.vy; this.vx *= 0.9; this.vy *= 0.9; this.size *= 0.97; this.life -= 0.02; }
        draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.fillStyle = '#94a1b2'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); ctx.restore(); }
    }

    class GoldenRing { 
        constructor(x, y) { this.x = x; this.y = y; this.r = 0; this.life = 1.0; }
        update() { this.r += (200 - this.r) * 0.15; this.life -= 0.02; }
        draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.strokeStyle = '#ffd700'; ctx.lineWidth = 10 * this.life; ctx.shadowColor = '#ffea00'; ctx.shadowBlur = 15; ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.stroke(); ctx.restore(); }
    }

    class RedSlash { 
        constructor(x, y) { this.x = x; this.y = y; this.life = 1.0; this.progress = 0; }
        update() { this.progress += (1 - this.progress) * 0.25; this.life -= 0.025; }
        draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.translate(this.x, this.y); ctx.strokeStyle = '#ffbbbb'; ctx.lineWidth = 20; ctx.lineCap = 'round'; ctx.shadowColor = 'rgba(255, 150, 150, 0.6)'; ctx.shadowBlur = 20; let length = 100 * this.progress; ctx.beginPath(); ctx.moveTo(-length, -length); ctx.lineTo(length, length); ctx.stroke(); ctx.restore(); }
    }

    class FloatingText {
        constructor(x, y, text, color) { this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1.0; this.scale = 0.5; }
        update() { this.y -= 1.2; this.life -= 0.012; this.scale += (1 - this.scale) * 0.2; }
        draw(ctx) { ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.translate(this.x, this.y); ctx.scale(this.scale, this.scale); ctx.fillStyle = this.color; ctx.font = 'bold 30px "Kaiti", serif'; ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4; ctx.textAlign = 'center'; ctx.fillText(this.text, 0, 0); ctx.restore(); }
    }

    let snowflakes = Array.from({ length: 100 }, () => new Snowflake());
    let raindrops = Array.from({ length: 80 }, () => new Raindrop());
    let petals = Array.from({ length: 30 }, () => new Petal());

    // ==========================================
    // 5. 畫面渲染與 UI 工具
    // ==========================================
    const UI = {
        box: {x: 80, y: 350, w: 640, h: 300}, 
        btns: [{x: 80, y: 680, w: 640, h: 60}, {x: 80, y: 760, w: 640, h: 60}, {x: 80, y: 840, w: 640, h: 60}],
        nL: {x: 230, y: 300, w: 40, h: 40}, nR: {x: 480, y: 300, w: 40, h: 40}, 
        rL: {x: 230, y: 400, w: 40, h: 40}, rR: {x: 480, y: 400, w: 40, h: 40},
        fL: {x: 230, y: 500, w: 40, h: 40}, fR: {x: 480, y: 500, w: 40, h: 40},
        cL: {x: 230, y: 600, w: 40, h: 40}, cR: {x: 480, y: 600, w: 40, h: 40},
        cfBtn: {x: 300, y: 700, w: 200, h: 60},
        maps: {maid:{x:80,y:400,w:300,h:180,n:"【夫人臥房】",d:"尋找春桃"}, chef:{x:420,y:400,w:300,h:180,n:"【侯府膳房】",d:"傳喚總管"}, doc:{x:80,y:620,w:300,h:180,n:"【前院廳堂】",d:"召見太醫"}, med:{x:420,y:620,w:300,h:180,n:"【廂房醫署】",d:"私下請教"}}
    };

    function getLines(ctx, text, maxWidth) {
        if (!text) return [];
        let lines = [], paragraphs = text.split('\n');
        for (let p of paragraphs) {
            let line = '';
            for (let char of p) {
                let testLine = line + char;
                if (ctx.measureText(testLine).width > maxWidth && line.length > 0) {
                    lines.push(line); line = char;
                } else { line = testLine; }
            }
            if (line.length > 0 || paragraphs.length > 1) lines.push(line);
        }
        return lines;
    }

    function isHovered(btn) {
        return mouse.x >= btn.x && mouse.x <= btn.x + btn.w && mouse.y >= btn.y && mouse.y <= btn.y + btn.h;
    }
    
    function drawButton(btnObj, text, isSmall=false) {
        let hover = isHovered(btnObj); 
        if(hover && lastHoveredBtn !== text){ SoundEngine.hover(); lastHoveredBtn = text; } 
        else if(!hover && lastHoveredBtn === text){ lastHoveredBtn = null; }
        
        ctx.fillStyle = hover ? '#a6855b' : 'rgba(44,36,27,0.9)'; 
        ctx.fillRect(btnObj.x, btnObj.y, btnObj.w, btnObj.h);
        ctx.strokeStyle = hover ? '#fff' : '#cdae77'; 
        ctx.lineWidth = isSmall ? 2 : (hover ? 3 : 2); 
        ctx.strokeRect(btnObj.x, btnObj.y, btnObj.w, btnObj.h);
        ctx.fillStyle = hover ? '#fff' : '#f4ebd0'; 
        ctx.font = isSmall ? 'bold 24px Kaiti' : '20px Kaiti'; 
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        
        if(isSmall) {
            ctx.fillText(text, btnObj.x + btnObj.w/2, btnObj.y + btnObj.h/2); 
        } else { 
            let ls = getLines(ctx, text, btnObj.w - 40); 
            let sy = btnObj.y + btnObj.h/2 - (ls.length-1)*13; 
            for(let i=0; i<ls.length; i++) ctx.fillText(ls[i], btnObj.x+btnObj.w/2, sy+i*26); 
        } 
        ctx.textBaseline='alphabetic';
    }

    function drawMapZone(zoneObj, roleId) {
        let hover = isHovered(zoneObj);
        if (hover && lastHoveredBtn !== zoneObj.name) { SoundEngine.hover(); lastHoveredBtn = zoneObj.name; }
        else if (!hover && lastHoveredBtn === zoneObj.name) { lastHoveredBtn = null; }

        ctx.fillStyle = hover ? 'rgba(100, 70, 50, 0.9)' : 'rgba(44, 36, 27, 0.85)';
        ctx.fillRect(zoneObj.x, zoneObj.y, zoneObj.w, zoneObj.h);
        ctx.strokeStyle = hover ? '#ffffff' : '#cdae77'; 
        ctx.lineWidth = hover ? 4 : 2;
        ctx.strokeRect(zoneObj.x, zoneObj.y, zoneObj.w, zoneObj.h);
        
        ctx.fillStyle = hover ? '#ffffff' : '#ffdd66'; 
        ctx.font = 'bold 32px Kaiti'; ctx.textAlign = 'center'; 
        ctx.fillText(zoneObj.name, zoneObj.x + zoneObj.w / 2, zoneObj.y + 80);
        
        ctx.fillStyle = '#f4ebd0'; ctx.font = '22px Kaiti'; 
        ctx.fillText(zoneObj.desc, zoneObj.x + zoneObj.w / 2, zoneObj.y + 130);
        
        let img = loadedImages[roleId] && loadedImages[roleId]['normal'];
        if(img && img.complete) {
            ctx.drawImage(img, 40, 30, 120, 120, zoneObj.x + zoneObj.w/2 - 40, zoneObj.y + 110, 80, 80);
        }
    }

    function drawDialogueBox(name, text, showHint = true) {
        ctx.fillStyle = 'rgba(44, 36, 27, 0.95)'; 
        ctx.fillRect(UI.box.x, UI.box.y, UI.box.w, UI.box.h); 
        ctx.strokeStyle = '#cdae77'; ctx.lineWidth = 3; 
        ctx.strokeRect(UI.box.x, UI.box.y, UI.box.w, UI.box.h);
        ctx.strokeStyle = 'rgba(205,174,119,0.3)'; ctx.lineWidth = 1; 
        ctx.strokeRect(UI.box.x+10, UI.box.y+10, UI.box.w-20, UI.box.h-20);

        if(name) { 
            ctx.fillStyle = '#cdae77'; 
            ctx.fillRect(UI.box.x + UI.box.w/2 - 120, UI.box.y - 25, 240, 50); 
            ctx.fillStyle = '#2c241b'; ctx.font = 'bold 26px Kaiti'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(name, UI.box.x + UI.box.w/2, UI.box.y); 
            ctx.textBaseline = 'alphabetic';
        }
        
        ctx.fillStyle = (text.includes("衛教小知識") || text.includes("調養小記")) ? '#ffdd66' : '#f4ebd0'; 
        ctx.font = '24px Kaiti'; ctx.textAlign = 'left'; ctx.textBaseline = 'top'; 
        let ls = getLines(ctx, text, UI.box.w - 60);
        for(let i=0; i<ls.length; i++) ctx.fillText(ls[i], UI.box.x+30, UI.box.y+50+i*34); 
        ctx.textBaseline = 'alphabetic';
        
        if(showHint) { 
            ctx.globalAlpha = (Math.sin(time*5)+1)/2*0.5+0.5; 
            ctx.fillStyle = '#cdae77'; ctx.font = '18px Kaiti'; ctx.textAlign = 'right'; 
            ctx.fillText("▼ 點擊畫面繼續 ▼", UI.box.x+UI.box.w-20, UI.box.y+UI.box.h-20); 
            ctx.globalAlpha = 1.0; 
        }
    }

    function drawDatePanel() {
        let d = daysData[Math.min(currentDay - 1, daysData.length - 1)];
        ctx.fillStyle = 'rgba(44, 36, 27, 0.85)'; ctx.fillRect(20, 20, 300, 110); 
        ctx.strokeStyle = '#cdae77'; ctx.lineWidth = 2; ctx.strokeRect(20, 20, 300, 110);
        ctx.fillStyle = '#ffdd66'; ctx.font = 'bold 22px Kaiti'; ctx.textAlign = 'left'; 
        ctx.fillText('【大宋 宣和元年】', 30, 50);
        ctx.fillStyle = '#f4ebd0'; ctx.font = '20px Kaiti'; 
        ctx.fillText(d.day, 40, 85); 
        ctx.fillText(`天氣: ${{sunny:"晴朗", cloudy:"多雲", rainy:"陰雨", snowy:"飛雪"}[d.weather]}`, 160, 85);
    }

    function drawStatsPanel() {
        ctx.fillStyle = 'rgba(44, 36, 27, 0.85)'; ctx.fillRect(480, 20, 300, 210); 
        ctx.strokeStyle = '#8b6b4a'; ctx.strokeRect(480, 20, 300, 210);
        ctx.fillStyle = '#eebb44'; ctx.font = 'bold 22px Kaiti'; ctx.textAlign = 'left'; 
        ctx.fillText('【府邸人際關係】', 500, 50);
        
        let sY = 90; 
        for(let k in player.affections) {
            let s = player.affections[k]; 
            s.current += (s.target - s.current) * 0.05;
            let col = '#f4ebd0'; 
            if(s.target <= 0) col = '#ff2222'; 
            else if(['嫌隙','心寒','厭惡','荒唐','心灰意冷','發抖','氣急敗壞','慌張','恐懼','強烈厭惡'].some(x => s.status.includes(x))) col = '#ff6666'; 
            else if(['崇拜','崇敬','死心塌地','情同姐妹','父母心','敬畏','知音','安心','欣慰','敬佩'].some(x => s.status.includes(x))) col = '#66ff66';
            
            ctx.fillStyle = '#f4ebd0'; ctx.font = '18px Kaiti'; ctx.fillText(s.name, 500, sY); 
            ctx.fillStyle = col; ctx.textAlign = 'right'; ctx.fillText(`[${s.status}]`, 760, sY); ctx.textAlign = 'left';
            ctx.fillStyle = '#333'; ctx.fillRect(500, sY+10, 260, 8); 
            ctx.fillStyle = s.color; ctx.fillRect(500, sY+10, Math.max(0, (s.current/s.max)*260), 8); 
            sY += 40;
        }
    }

    function getBackground(loc) {
        if(bgCanvases[loc]) return bgCanvases[loc]; 
        let c = document.createElement('canvas'); c.width = 800; c.height = 900; let bx = c.getContext('2d');
        if(loc.includes('臥房') || loc.includes('正房')){ 
            let g = bx.createLinearGradient(0,0,0,900); g.addColorStop(0,"#2a1e12"); g.addColorStop(1,"#1a0f0a"); bx.fillStyle=g; bx.fillRect(0,0,800,900);

    function saveGame() {
        localStorage.setItem("BJS", JSON.stringify({d:day,P,Q:QPool,sn:selN,sf:selF,sc:selC,sb:selB}));
        fTexts.push(new FloatingText(400,200,"【進度已儲存】","#6ff")); SE.save();
    }
    function loadGame() {
        let s=localStorage.getItem("BJS"); 
        if(s){try{let d=JSON.parse(s); day=d.d; P=d.P; QPool=d.Q; selN=d.sn; selF=d.sf; selC=d.sc; selB=d.sb; isEarlyEnd=false; state=STATES.DAY_TRANSITION; SE.win(); return true;}catch(e){}} 
        return false;
    }
    function hasSaveGame() { return localStorage.getItem("BJS")!==null; }

    function initG() {
        isEarlyEnd = false; earlyEndChar = ""; P.score = 50;
        for(let k in P.aff) { P.aff[k].c = 50; P.aff[k].t = 50; P.aff[k].s = "平淡"; }
        for(let k in QPool) {
            QPool[k].forEach(q => q.opts = shuf([...q.opts]));
            QPool[k] = shuf([...QPool[k]]);
        }
        day = 1; storyLine = 0; currentExpr = 'normal'; state = STATES.DAY_TRANSITION;
    }

    function checkEnd() { for(let k in P.aff) if(P.aff[k].t <= 10) { isEarlyEnd = true; earlyEndChar = k; return; } }

    function applyOpt(opt) {
        let oY = 250, hasP = false, hasN = false;
        P.score += opt.h; currentExpr = opt.ex;
        opt.af.forEach(r => {
            let tc = P.aff[r.c]; tc.t = Math.max(0, Math.min(tc.m, tc.t + r.v)); tc.s = r.s;
            let c = r.v >= 0 ? tc.col : "#94a1b2", s = r.v >= 0 ? "+" : "";
            fTexts.push(new FloatingText(canvas.width/2, oY, `${tc.n} ${s}${r.v}`, c)); oY -= 40;
            if(r.v > 0) { hasP = true; for(let i=0;i<20;i++) pts.push(new Conf(canvas.width/2,400,tc.col)); }
            else { hasN = true; for(let i=0;i<15;i++) pts.push(new DAura(canvas.width/2,400)); }
        });
        if(opt.af.length===0 && opt.h<0) { hasN = true; for(let i=0;i<15;i++) pts.push(new DAura(canvas.width/2,400)); }
        if(hasP) { flash.a=0.3; flash.c='#fff'; sfxs.push(new GRing(canvas.width/2,350)); }
        if(currentExpr==='angry' || currentExpr==='shocked') {
            if(hasN) { shake = 5; flash.a=0.2; flash.c='#ffaaaa'; sfxs.push(new RSlash(canvas.width/2,350)); }
        }
        checkEnd();
    }

            currentStage = QPool[rId].pop();

                char: P.aff[rId].n, img: rId,

            } else if(totAff>=160) {
                eType='normal'; eTitle="【結局：漸入佳境，來日方長】"; eColor="#ffe4b5";
                endScenes.push({role: 'maid', expr: 'happy', n: "【踏實的一步】", t: `這七日的時光雖然偶有新手媽媽的生疏，但您與寶寶都在努力適應彼此，建立起良好的默契。`});
                endScenes.push({role: 'player', expr: 'happy', n: "【溫暖支持】", t: "下人們看著您體貼且努力的模樣，無不盡力給予協助。母乳與調養之路雖然需要時間，但有大家的陪伴，未來定能越來越好。"});
            } else {
                eType='normal'; eTitle="【結局：新手上路，溫柔以待】"; eColor="#b0c4de";
                endScenes.push({role: 'doctor', expr: 'shocked', n: "【給予空間】", t: `剛經歷完生產，身心疲憊在所難免。面對繁瑣的餵奶與調養知識，一時感到力不從心也是完全正常的。`});
                endScenes.push({role: 'player', expr: 'normal', n: "【擁抱自己】", t: "這只是第一週，您已經跨出了最勇敢的一步。不要給自己太大的壓力，放慢腳步，給自己和寶寶多一點時間與溫柔，大家都深深支持著您。"});
            }
            if(P.aff['maid'].t>=80) endScenes.push({role: 'maid', expr:'happy',n:"【春桃的承諾】",t:`春桃貼心地替您捏腳：「夫人，奴婢看著您學餵奶雖然辛苦，但您真了不起。奴婢一定會好好幫您分擔的！」`});
            if(P.aff['chef'].t>=80) endScenes.push({role: 'chef', expr:'happy',n:"【總管的敬意】",t:`總管在膳房特別注意：「夫人產後脾胃嬌貴，那些生冷油膩的通通不許上，天天都要給夫人準備最好的清淡滋補湯！」`});
            if(P.aff['doctor'].t>=80) endScenes.push({role: 'doctor', expr:'happy',n:"【太醫的讚許】",t:`張太醫懸絲診脈後微笑：「夫人氣血平穩，皆因情緒調適得當、不盲信偏方，實乃母嬰之福。」`});
            if(P.aff['medic'].t>=80) endScenes.push({role: 'medic', expr:'happy',n:"【蘇氏的陪伴】",t:`蘇醫女常來陪您聊天、指導正確含乳：「夫人進步真快，看少爺吸吮得多好。您若累了隨時叫我，別憋在心裡喔。」`});
        }
    }

    // ==========================================
    // 6. UI 與觸控邏輯
    // ==========================================
    function handleClick() {
        if(state===STATES.START) {
            if(isHov({x:300,y:450,w:200,h:60})) { SE.click(); state=STATES.CREATION; }
            if(hasS()&&isHov({x:300,y:550,w:200,h:60})) { SE.click(); if(loadGame()) return; }
        } else if(state===STATES.CREATION) {
            if(isHov(UI.nL)){SE.click();selN=(selN-1+NList.length)%NList.length;} if(isHov(UI.nR)){SE.click();selN=(selN+1)%NList.length;}
            if(isHov(UI.rL)){SE.click();selB=(selB-1+BList.length)%BList.length;} if(isHov(UI.rR)){SE.click();selB=(selB+1)%BList.length;}
            if(isHov(UI.fL)){SE.click();selF=(selF-1+FList.length)%FList.length;} if(isHov(UI.fR)){SE.click();selF=(selF+1)%FList.length;}
            if(isHov(UI.cL)){SE.click();selC=(selC-1+CList.length)%CList.length;} if(isHov(UI.cR)){SE.click();selC=(selC+1)%CList.length;}
            if(isHov(UI.cfBtn)){SE.click();P.name=NList[selN]; P.id=`player_${FList[selF]}_${CList[selC]}`; P.origin=BList[selB]; P.residence=residences[selB]; initG();}
        } else if(state===STATES.DAY_TRANSITION) {
            SE.click();
            if(day===1) { currentStage=introStage; if(currentStage.opts) currentStage.opts=shuf(currentStage.opts); state=STATES.STORY; }
            else if(day===3) { currentStage=originStages[P.origin]; if(currentStage.opts) currentStage.opts=shuf(currentStage.opts); state=STATES.STORY; }
            else state=STATES.MAP;
        } else if(state===STATES.MAP) {
            let rId=null; if(isHov(UI.maps.maid)) rId='maid'; else if(isHov(UI.maps.chef)) rId='chef'; else if(isHov(UI.maps.doc)) rId='doctor'; else if(isHov(UI.maps.med)) rId='medic';
            if(rId){SE.click(); trigSummon(rId);}
        } else if(state===STATES.STORY) {
            SE.click(); storyLine++; if(storyLine>=currentStage.s.length) state=STATES.QUESTION;
        } else if(state===STATES.QUESTION) {
            for(let i=0;i<3;i++) {
                if(isHov(UI.btns[i])) {
                    let opt=currentStage.opts[i]; fbText=opt.fb; applyOpt(opt);
                    if(opt.h>0)SE.win(); else SE.fail(); state=STATES.FEEDBACK; break;
                }
            }
        } else if(state===STATES.FEEDBACK) {
            SE.click();
            if(isEarlyEnd){ genEnd(); state=STATES.END_ANIM; shake=25; flash.a=0.5; flash.c='#f00'; }
            else { day++; storyLine=0; currentExpr='normal'; saveGame(); if(day>7){genEnd();state=STATES.END_ANIM;}else state=STATES.DAY_TRANSITION; }
        } else if(state===STATES.END_ANIM) {
            SE.click(); endIdx++;
            if(endIdx>=endScenes.length) { state=STATES.END; if(eType==='good'){flash.a=0.6;flash.c='#fff';} }
            else { let ex=endScenes[endIdx].expr; if(ex==='angry'){shake=10;flash.a=0.2;flash.c='#f00';} if(ex==='happy'){flash.a=0.2;flash.c='#fff';} }
        } else if(state===STATES.END) {
            if(isHov({x:300,y:750,w:200,h:60})) { SE.click(); state=STATES.START; }
        }
    }

    canvas.addEventListener('mousedown', e => { SE.init(); updateMouse(e.clientX, e.clientY); handleClick(); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); SE.init(); updateMouse(e.touches[0].clientX, e.touches[0].clientY); handleClick(); }, {passive: false});
    canvas.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
    canvas.addEventListener('selectstart', e => e.preventDefault());
    
    requestAnimationFrame(gameLoop);
</script>
