<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>汴京娘子調養記 - 獨立角色高階渲染版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #05070a;
            font-family: 'Kaiti', '標楷體', 'Times New Roman', serif;
            overflow: hidden; 
            color: #fff;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); 

    let dpr = window.devicePixelRatio || 1;
    let cw = window.innerWidth;
    let ch = window.innerHeight;
    
    function resize() {
        cw = window.innerWidth;
        ch = window.innerHeight;
        canvas.width = cw * dpr;
        canvas.height = ch * dpr;
    }
    window.addEventListener('resize', resize);
    resize();

    const STATES = { START: 0, STORY: 1, QUESTION: 2, FEEDBACK: 3, END: 4 };
    let currentState = STATES.START;
    let currentDay = 1;
    let currentStoryLine = 0;
    let selectedOptionFeedback = "";
    
    let mouse = { x: cw/2, y: ch/2, targetX: cw/2, targetY: ch/2 };
    let time = 0;
    let dt = 0;
    let lastTime = 0;
    let clickZones = []; 
    
    let cameraShake = { x: 0, y: 0, amount: 0 };
    let bloomIntensity = 0;
    let dustParticles = [];

    let player = { 
        knowledgeScore: 50,
        affections: {
            maid: { name: "丫鬟 春桃", current: 50, target: 50, max: 100, color: "#e86f88", status: "平淡" },
            chef: { name: "膳房 總管", current: 50, target: 50, max: 100, color: "#d29c72", status: "平淡" },
            doctor: { name: "太醫 張大人", current: 50, target: 50, max: 100, color: "#6ca07e", status: "平淡" },
            medic: { name: "醫女 蘇氏", current: 50, target: 50, max: 100, color: "#82c0d9", status: "平淡" }
        }
    };

    class ProceduralLive2DCharacter {
        constructor(role, customColors = null) {
            this.role = role; // 'player', 'maid', 'chef', 'doctor', 'medic'
            this.breathingPhase = Math.random() * Math.PI;
            this.hairPhase = Math.random() * Math.PI;
            this.blinkTimer = Math.random() * 3;
            this.eyeOpenness = 1;
            
            this.targetEmotion = { smile: 0, browAngle: 0, eyeWide: 1.0 };
            this.currentEmotion = { smile: 0, browAngle: 0, eyeWide: 1.0 };
            
            this.colors = customColors || {
                skinBase: '#fae3d9', skinShadow: '#d9a896', skinHighlight: '#fff1ec',
                hairDark: '#0a0b10', hairLight: '#2c2f3f',
                silkBase: '#8b1e28', silkShadow: '#4a0e14', goldTrim: '#d4af37'
            };
        }

        setEmotion(emotionType) {
            switch(emotionType) {
                case 'happy': this.targetEmotion = { smile: 1.2, browAngle: 0.3, eyeWide: 0.9 }; break;
                case 'shocked': this.targetEmotion = { smile: -0.3, browAngle: 0.6, eyeWide: 1.3 }; break;
                case 'angry': this.targetEmotion = { smile: -0.6, browAngle: -0.7, eyeWide: 0.9 }; break;
                default: this.targetEmotion = { smile: 0.2, browAngle: 0, eyeWide: 1.0 }; break;
            }
        }

        update(dt) {
            this.breathingPhase += dt * (this.role === 'chef' ? 1.0 : 1.5); // 總管呼吸較慢
            this.hairPhase += dt * 2.0;

            this.blinkTimer -= dt;
            if (this.blinkTimer <= 0) {
                this.eyeOpenness -= dt * 15;
                if (this.eyeOpenness <= 0) {
                    this.eyeOpenness = 0;
                    this.blinkTimer = Math.random() * 3 + 2; 
                }
            } else {
                this.eyeOpenness += dt * 10;
                if (this.eyeOpenness > 1) this.eyeOpenness = 1;
            }

            this.currentEmotion.smile += (this.targetEmotion.smile - this.currentEmotion.smile) * dt * 5;
            this.currentEmotion.browAngle += (this.targetEmotion.browAngle - this.currentEmotion.browAngle) * dt * 5;
            this.currentEmotion.eyeWide += (this.targetEmotion.eyeWide - this.currentEmotion.eyeWide) * dt * 5;
        }

        draw(ctx, cx, cy, scale, isMini = false) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.scale(scale, scale);

            let breathY = Math.sin(this.breathingPhase) * 3;
            let breathScale = 1 + Math.sin(this.breathingPhase) * 0.005;
            let swayX = Math.sin(this.hairPhase) * 4;
            let swayY = Math.cos(this.hairPhase * 0.8) * 2;

            let lookDx = isMini ? 0 : (mouse.x - cx) * 0.015;
            let lookDy = isMini ? 0 : (mouse.y - cy) * 0.015;

            this.drawBackHair(ctx, swayX, swayY);

            ctx.save();
            ctx.translate(lookDx * 0.5, breathY);
            ctx.scale(1, breathScale);
            this.drawBody(ctx, isMini);
            ctx.restore();

            ctx.save();
            ctx.translate(lookDx, lookDy + breathY * 0.5);
            this.drawFaceBase(ctx, isMini);
            
            ctx.save();
            ctx.translate(lookDx * 0.3, lookDy * 0.3);
            this.drawFeatures(ctx);
            ctx.restore();

            this.drawFrontHair(ctx, swayX, swayY);
            ctx.restore();

            if (!isMini) this.drawCinematicLighting(ctx, cx, cy);

            ctx.restore();
        }

        drawBody(ctx, isMini) {
            let silkGrad = ctx.createLinearGradient(0, 0, 0, 300);
            silkGrad.addColorStop(0, this.colors.silkBase);
            silkGrad.addColorStop(1, this.colors.silkShadow);

            ctx.fillStyle = silkGrad;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = isMini ? 0 : 15;
            
            ctx.beginPath();
            if (this.role === 'chef') {
                // 較為寬碩的身軀
                ctx.moveTo(-170, 300); ctx.quadraticCurveTo(-120, 80, -40, 80); 
                ctx.lineTo(40, 80); ctx.quadraticCurveTo(120, 80, 170, 300);
            } else if (this.role === 'doctor') {
                // 挺拔的官服身軀
                ctx.moveTo(-140, 300); ctx.lineTo(-90, 80); 
                ctx.lineTo(90, 80); ctx.lineTo(140, 300);
            } else {
                // 柔美的女性身軀
                ctx.moveTo(-130, 300); ctx.quadraticCurveTo(-90, 80, -30, 80); 
                ctx.lineTo(30, 80); ctx.quadraticCurveTo(90, 80, 130, 300);
            }
            ctx.fill(); ctx.shadowBlur = 0;

            // 衣領細節
            let collarGrad = ctx.createLinearGradient(-50, 80, 50, 150);
            collarGrad.addColorStop(0, '#e6e6e6'); collarGrad.addColorStop(1, '#b3b3b3');
            ctx.fillStyle = collarGrad;
            
            if (this.role === 'doctor') {
                // 圓領官服
                ctx.beginPath(); ctx.arc(0, 100, 50, Math.PI, 0); ctx.lineTo(50,120); ctx.lineTo(-50,120); ctx.fill();
            } else {
                // 交領
                ctx.beginPath(); ctx.moveTo(-50, 80); ctx.lineTo(0, 140); ctx.lineTo(50, 80); ctx.lineTo(80, 100); ctx.lineTo(0, 200); ctx.lineTo(-80, 100); ctx.fill();
            }

            if (this.colors.goldTrim) {
                ctx.strokeStyle = this.colors.goldTrim; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(-70, 95); ctx.lineTo(0, 190); ctx.lineTo(70, 95); ctx.stroke();
            }
            
            // 脖子
            let neckGrad = ctx.createLinearGradient(0, 50, 0, 90);
            neckGrad.addColorStop(0, this.colors.skinShadow); neckGrad.addColorStop(1, this.colors.skinBase);
            ctx.fillStyle = neckGrad;
            ctx.beginPath(); 
            if(this.role === 'chef') {
                ctx.moveTo(-30, 40); ctx.lineTo(30, 40); ctx.lineTo(35, 90); ctx.lineTo(-35, 90); 
            } else {
                ctx.moveTo(-20, 40); ctx.lineTo(20, 40); ctx.lineTo(25, 90); ctx.lineTo(-25, 90); 
            }
            ctx.fill();
        }

        drawFaceBase(ctx, isMini) {
            let faceGrad = ctx.createRadialGradient(0, -20, 10, 0, 0, 80);
            faceGrad.addColorStop(0, this.colors.skinHighlight);
            faceGrad.addColorStop(0.7, this.colors.skinBase);
            faceGrad.addColorStop(1, this.colors.skinShadow);

            ctx.fillStyle = faceGrad;
            ctx.shadowColor = 'rgba(0,0,0,0.2)'; ctx.shadowBlur = isMini ? 0 : 10;
            
            ctx.beginPath();
            if (this.role === 'chef') {
                // 圓潤臉頰
                ctx.moveTo(0, 70); ctx.bezierCurveTo(60, 60, 75, 0, 65, -40); 
                ctx.bezierCurveTo(60, -80, -60, -80, -65, -40); ctx.bezierCurveTo(-75, 0, -60, 60, 0, 70);
            } else if (this.role === 'doctor') {
                // 瘦長臉型
                ctx.moveTo(0, 65); ctx.bezierCurveTo(40, 50, 50, 0, 45, -40); 
                ctx.bezierCurveTo(40, -80, -40, -80, -45, -40); ctx.bezierCurveTo(-50, 0, -40, 50, 0, 65);
            } else {
                // 瓜子臉
                ctx.moveTo(0, 60); ctx.bezierCurveTo(45, 50, 55, 0, 50, -40); 
                ctx.bezierCurveTo(45, -80, -45, -80, -50, -40); ctx.bezierCurveTo(-55, 0, -45, 50, 0, 60);
            }
            ctx.fill(); ctx.shadowBlur = 0;

            // 女性角色腮紅
            if (this.role === 'player' || this.role === 'maid' || this.role === 'medic') {
                ctx.globalCompositeOperation = 'multiply';
                let blushGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 20);
                blushGrad.addColorStop(0, 'rgba(255, 100, 100, 0.18)'); blushGrad.addColorStop(1, 'rgba(255, 100, 100, 0)');
                ctx.save(); ctx.translate(-35, 10); ctx.fillStyle = blushGrad; ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.fill(); ctx.restore();
                ctx.save(); ctx.translate(35, 10); ctx.fillStyle = blushGrad; ctx.beginPath(); ctx.arc(0,0,20,0,Math.PI*2); ctx.fill(); ctx.restore();
                ctx.globalCompositeOperation = 'source-over';
            }
        }

        drawFeatures(ctx) {
            ctx.strokeStyle = '#2a1a10'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
            let browY = -35; let browA = this.currentEmotion.browAngle * 10;
            
            // 男生眉毛較粗
            if(this.role === 'doctor' || this.role === 'chef') { ctx.lineWidth = 4; browY = -30; }

            ctx.beginPath(); ctx.moveTo(-45, browY - browA); ctx.quadraticCurveTo(-30, browY - 5, -15, browY + browA); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(45, browY - browA); ctx.quadraticCurveTo(30, browY - 5, 15, browY + browA); ctx.stroke();

            let eyeY = -10;
            // 男生眼睛略小
            let eyeMod = (this.role === 'doctor' || this.role === 'chef') ? 0.6 : 1.0;
            let eyeScaleY = this.eyeOpenness * this.currentEmotion.eyeWide * eyeMod;
            
            const drawEye = (ex, ey, flip) => {
                ctx.save(); ctx.translate(ex, ey); ctx.scale(flip ? -1 : 1, 1);
                
                ctx.fillStyle = '#fcfcfc'; 
                ctx.beginPath(); ctx.moveTo(-15, 0); ctx.quadraticCurveTo(0, -12 * eyeScaleY, 15, 0); ctx.quadraticCurveTo(0, 4 * eyeScaleY, -15, 0); ctx.fill();

                if (eyeScaleY > 0.1) {
                    ctx.save(); ctx.beginPath(); ctx.moveTo(-15, 0); ctx.quadraticCurveTo(0, -12 * eyeScaleY, 15, 0); ctx.quadraticCurveTo(0, 4 * eyeScaleY, -15, 0); ctx.clip();
                    let irisGrad = ctx.createRadialGradient(0, 2, 0, 0, 0, 8);
                    irisGrad.addColorStop(0, (this.role==='player')?'#8c5a35':'#4a3020'); 
                    irisGrad.addColorStop(1, '#1a0a05');
                    ctx.fillStyle = irisGrad; ctx.beginPath(); ctx.arc(0, 0, 7, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#0a0502'; ctx.beginPath(); ctx.arc(0, 0, 3, 0, Math.PI*2); ctx.fill();
                    
                    if(this.role !== 'chef' && this.role !== 'doctor') {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)'; ctx.beginPath(); ctx.arc(-3, -3, 2, 0, Math.PI*2); ctx.fill();
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)'; ctx.beginPath(); ctx.arc(3, 3, 1.5, 0, Math.PI*2); ctx.fill();
                    } else {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)'; ctx.beginPath(); ctx.arc(-2, -2, 1.5, 0, Math.PI*2); ctx.fill();
                    }
                    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.arc(0, -8, 10, 0, Math.PI*2); ctx.fill();
                    ctx.restore(); 
                }

                ctx.strokeStyle = '#1a0a05'; ctx.lineWidth = (this.role === 'player' || this.role === 'maid') ? 3.5 : 2;
                ctx.beginPath(); ctx.moveTo(-18, 2); ctx.quadraticCurveTo(0, -14 * eyeScaleY, 18, 2); ctx.stroke();
                
                // 女性眼線
                if(this.role === 'player' || this.role === 'maid' || this.role === 'medic') {
                    ctx.lineWidth = 1.5;
                    ctx.beginPath(); ctx.moveTo(15, 0); ctx.lineTo(22, -6 * eyeScaleY); ctx.stroke();
                }
                ctx.restore();
            };

            drawEye(-25, eyeY, false); drawEye(25, eyeY, true);

            // 鼻子
            ctx.fillStyle = this.colors.skinShadow; ctx.beginPath(); ctx.arc(0, 15, (this.role==='chef')?3:1.5, 0, Math.PI*2); ctx.fill();
            
            // 嘴唇
            let mouthY = 35; let smile = this.currentEmotion.smile * 5;
            let lipGrad = ctx.createLinearGradient(0, mouthY-2, 0, mouthY+5);
            lipGrad.addColorStop(0, (this.role==='doctor'||this.role==='chef')?'#a67c7c':'#c75c5c'); 
            lipGrad.addColorStop(1, (this.role==='doctor'||this.role==='chef')?'#8a5c5c':'#a63c3c');
            
            ctx.fillStyle = lipGrad; ctx.strokeStyle = (this.role==='doctor'||this.role==='chef')?'#6b3b3b':'#8a2b2b'; ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(-10, mouthY - smile*0.5); ctx.quadraticCurveTo(0, mouthY + smile, 10, mouthY - smile*0.5); ctx.quadraticCurveTo(0, mouthY + 3 + smile, -10, mouthY - smile*0.5);
            ctx.fill(); ctx.stroke();

            // === 男生專屬鬍鬚 ===
            if (this.role === 'doctor') {
                ctx.fillStyle = '#3a3a3a';
                // 山羊鬍
                ctx.beginPath(); ctx.moveTo(-15, 45); ctx.quadraticCurveTo(0, 140, 15, 45); ctx.quadraticCurveTo(0, 60, -15, 45); ctx.fill();
                // 八字鬍
                ctx.beginPath(); ctx.moveTo(-5, 28); ctx.quadraticCurveTo(-25, 35, -30, 45); ctx.quadraticCurveTo(-15, 30, -5, 28); ctx.fill();
                ctx.beginPath(); ctx.moveTo(5, 28); ctx.quadraticCurveTo(25, 35, 30, 45); ctx.quadraticCurveTo(15, 30, 5, 28); ctx.fill();
            } else if (this.role === 'chef') {
                ctx.fillStyle = '#1a100a';
                // 粗八字鬍
                ctx.beginPath(); ctx.moveTo(-8, 26); ctx.quadraticCurveTo(-25, 30, -35, 40); ctx.quadraticCurveTo(-15, 38, -8, 30); ctx.fill();
                ctx.beginPath(); ctx.moveTo(8, 26); ctx.quadraticCurveTo(25, 30, 35, 40); ctx.quadraticCurveTo(15, 38, 8, 30); ctx.fill();
            }
        }

        drawBackHair(ctx, swayX, swayY) {
            if (this.role === 'chef' || this.role === 'doctor') return; // 男生頭髮包在帽子裡
            
            let hGrad = ctx.createLinearGradient(0, -100, 0, 300);
            hGrad.addColorStop(0, this.colors.hairLight); hGrad.addColorStop(1, '#000000');
            ctx.fillStyle = hGrad;
            
            if (this.role === 'player') {
                ctx.beginPath(); ctx.moveTo(-50, -50); ctx.bezierCurveTo(-100, 50, -120 + swayX, 200, -80 + swayX*1.5, 300 + swayY);
                ctx.lineTo(80 + swayX*1.5, 300 + swayY); ctx.bezierCurveTo(120 + swayX, 200, 100, 50, 50, -50); ctx.fill();
            } else if (this.role === 'maid') {
                // 短髮披肩
                ctx.beginPath(); ctx.moveTo(-40, -50); ctx.bezierCurveTo(-80, 50, -90 + swayX, 120, -70 + swayX, 150 + swayY);
                ctx.lineTo(70 + swayX, 150 + swayY); ctx.bezierCurveTo(90 + swayX, 120, 80, 50, 40, -50); ctx.fill();
            } else if (this.role === 'medic') {
                // 盤髮，後方收攏
                ctx.beginPath(); ctx.arc(0, -30, 50, 0, Math.PI*2); ctx.fill();
            }
        }

        drawFrontHair(ctx, swayX, swayY) {
            ctx.fillStyle = this.colors.hairDark;

            // === 總管 (廚子帽) ===
            if (this.role === 'chef') {
                ctx.fillStyle = '#6e523f';
                ctx.beginPath(); ctx.arc(0, -45, 55, Math.PI, 0); ctx.fill(); // 帽體
                ctx.fillRect(-55, -45, 110, 20); // 帽簷
                ctx.fillStyle = '#4a3528'; ctx.fillRect(-55, -30, 110, 5); // 帽帶
                return;
            }
            
            // === 太醫 (烏紗帽) ===
            if (this.role === 'doctor') {
                ctx.fillStyle = '#111';
                // 官帽主體
                ctx.fillRect(-45, -90, 90, 60);
                ctx.beginPath(); ctx.arc(0, -90, 45, Math.PI, 0); ctx.fill();
                ctx.fillRect(-50, -30, 100, 10);
                // 官帽兩側展角 (Wing flaps)
                ctx.fillStyle = '#0a0a0a';
                ctx.fillRect(-120, -45, 70, 15);
                ctx.fillRect(50, -45, 70, 15);
                return;
            }

            // === 女性頭髮基底 ===
            ctx.beginPath(); ctx.arc(0, -50, 60, Math.PI, 0); ctx.fill();

            const drawStrand = (sx, sy, c1x, c1y, c2x, c2y, ex, ey, w) => {
                ctx.beginPath(); ctx.moveTo(sx, sy); ctx.bezierCurveTo(c1x, c1y, c2x, c2y, ex, ey); 
                ctx.bezierCurveTo(c2x + w, c2y, c1x + w, c1y, sx + w, sy); ctx.fill();
            };

            let hGrad = ctx.createLinearGradient(0, -100, 0, 50);
            hGrad.addColorStop(0, this.colors.hairLight); hGrad.addColorStop(1, this.colors.hairDark);
            ctx.fillStyle = hGrad;

            if (this.role === 'player') {
                drawStrand(-55, -20, -70, 20, -75 + swayX, 80, -65 + swayX, 120 + swayY, 15);
                drawStrand(40, -20, 55, 20, 60 + swayX, 80, 50 + swayX, 120 + swayY, 15);
                drawStrand(-20, -60, -30, -20, -25 + swayX*0.2, 0, -10 + swayX*0.5, 10, 20);
                drawStrand(0, -60, 10, -20, 15 + swayX*0.2, 0, 25 + swayX*0.5, -5, 25);
                
                // 金步搖
                ctx.strokeStyle = this.colors.goldTrim; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(-50, -40); ctx.lineTo(-70 + swayX*1.5, 10 + swayY*1.5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(50, -40); ctx.lineTo(70 + swayX*1.5, 10 + swayY*1.5); ctx.stroke();
                ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.arc(-70 + swayX*1.5, 10 + swayY*1.5, 4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(70 + swayX*1.5, 10 + swayY*1.5, 4, 0, Math.PI*2); ctx.fill();
            } 
            else if (this.role === 'maid') {
                // 雙丫髻 (Twin Buns)
                ctx.beginPath(); ctx.arc(-45, -80, 25, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(45, -80, 25, 0, Math.PI*2); ctx.fill();
                // 紅色緞帶
                ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(-45, -80, 25, 0, Math.PI); ctx.stroke();
                ctx.beginPath(); ctx.arc(45, -80, 25, 0, Math.PI); ctx.stroke();
                // 瀏海
                drawStrand(-25, -55, -30, -20, -15, -10, -5, 0, 25);
                drawStrand(0, -55, 10, -20, 20, -10, 30, -5, 25);
            }
            else if (this.role === 'medic') {
                // 醫女頭巾 (White/Blue Scarf)
                ctx.fillStyle = '#d4e6f1';
                ctx.beginPath(); ctx.arc(0, -60, 58, Math.PI, 0); ctx.fill();
                ctx.fillRect(-58, -60, 116, 25);
                ctx.fillStyle = '#a9cce3'; ctx.fillRect(-58, -35, 116, 5);
                // 旁分瀏海
                drawStrand(-45, -35, -50, 0, -40 + swayX*0.5, 20, -30 + swayX*0.5, 40, 15);
                drawStrand(30, -35, 40, 0, 45 + swayX*0.5, 20, 35 + swayX*0.5, 40, 15);
            }

            // 女性髮絲光圈
            if(this.role !== 'medic') {
                ctx.globalCompositeOperation = 'screen';
                let haloGrad = ctx.createLinearGradient(0, -70, 0, -40);
                haloGrad.addColorStop(0, 'rgba(255,255,255,0)'); haloGrad.addColorStop(0.5, 'rgba(150, 160, 200, 0.3)'); haloGrad.addColorStop(1, 'rgba(255,255,255,0)');
                ctx.fillStyle = haloGrad; ctx.beginPath(); ctx.ellipse(0, -55, 50, 12, 0, 0, Math.PI*2); ctx.fill();
                ctx.globalCompositeOperation = 'source-over';
            }
        }

        drawCinematicLighting(ctx, cx, cy) {
            let dx = mouse.x - cx; let dy = mouse.y - cy;
            ctx.globalCompositeOperation = 'screen';
            
            let rimGrad = ctx.createRadialGradient(dx * 0.5, dy * 0.5, 50, 0, 0, 300);
            rimGrad.addColorStop(0, 'rgba(212, 175, 55, 0.25)'); // 金色主光
            rimGrad.addColorStop(0.5, 'rgba(100, 150, 255, 0.1)'); // 藍色補光
            rimGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = rimGrad; ctx.fillRect(-200, -200, 400, 500);

            let specGrad = ctx.createRadialGradient(dx*0.1, dy*0.1, 0, dx*0.1, dy*0.1, 80);
            specGrad.addColorStop(0, 'rgba(255, 255, 255, 0.1)'); specGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = specGrad; ctx.fillRect(-200, -200, 400, 500);

    let floatingTexts = [];
    class FloatingText {
        constructor(x, y, text, color) {
            this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1.0; this.scale = 0.5;
        }
        update() { this.y -= 1.2; this.life -= 0.015; this.scale += (1 - this.scale) * 0.2; }
        draw(ctx) {
            ctx.save(); ctx.globalAlpha = Math.max(0, this.life); ctx.translate(this.x, this.y); ctx.scale(this.scale, this.scale);
            ctx.fillStyle = this.color; ctx.font = 'bold 28px "Kaiti", "標楷體", serif'; ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4; 
            ctx.textAlign = 'center'; ctx.fillText(this.text, 0, 0); ctx.restore();
        }
    }

    function applyChoice(opt) {
        player.knowledgeScore += opt.val;
        mainCharacter.setEmotion(opt.expr);
        selectedOptionFeedback = opt.feedback;
        
        let offsetY = ch/2 - 100;
        let hasPositive = false; let hasNegative = false;

        if (opt.affects) {
            opt.affects.forEach((r) => {
                let targetChar = player.affections[r.char];
                if (targetChar) {
                    targetChar.target = Math.max(0, Math.min(targetChar.max, targetChar.target + r.val)); targetChar.status = r.status;
                    let color = r.val >= 0 ? targetChar.color : "#e74c3c";
                    floatingTexts.push(new FloatingText(cw/2, offsetY, `${targetChar.name} ${r.val>=0?'+':''}${r.val}`, color));
                    offsetY -= 40;
                    if(r.val > 0) hasPositive = true; else hasNegative = true;
                }
            });
        }
        
        let kColor = opt.val > 0 ? '#4caf50' : '#e74c3c';
        floatingTexts.push(new FloatingText(cw/2, offsetY, `${opt.val > 0 ? '+' : ''}${opt.val} 調養知識`, kColor));
        
        if (opt.val > 0 || hasPositive) bloomIntensity = 1.0; 
        if (opt.val < 0 || hasNegative) cameraShake.amount = 10;
        
        currentState = STATES.FEEDBACK;
    }

    function drawGlassPanel(ctx, x, y, w, h) {
        ctx.save();
        ctx.fillStyle = 'rgba(12, 16, 24, 0.85)'; ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill();
        ctx.strokeStyle = 'rgba(212, 175, 55, 0.6)'; ctx.lineWidth = 2; ctx.stroke();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)'; ctx.beginPath(); ctx.roundRect(x+3, y+3, w-6, h-6, 5); ctx.stroke();
        ctx.restore();
    }

    // 完美自適應斷行系統，回傳需要的總行數
    function wrapText(ctx, text, maxWidth) {
        let words = text.split('');
        let lines = [];
        let currentLine = '';

        for (let i = 0; i < words.length; i++) {
            let char = words[i];
            if (char === '\n') {
                lines.push(currentLine);
                currentLine = '';
                continue;
            }
            let testLine = currentLine + char;
            let metrics = ctx.measureText(testLine);
            if (metrics.width > maxWidth && currentLine !== '') {
                lines.push(currentLine);
                currentLine = char;
            } else {
                currentLine = testLine;
            }
        }
        if (currentLine) lines.push(currentLine);
        return lines;
    }

    function drawCinematicText(ctx, text, x, y, maxWidth, isTitle = false) {
        ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;
        ctx.fillStyle = isTitle ? '#d4af37' : '#f0f0f0'; 
        ctx.font = isTitle ? 'bold 24px "Kaiti"' : '20px "Kaiti"';
        ctx.textBaseline = 'top';
        
        let lines = wrapText(ctx, text, maxWidth);
        let lineHeight = isTitle ? 34 : 30;

        lines.forEach((line, index) => {
            ctx.fillText(line, x, y + index * lineHeight);
        });
        
        ctx.shadowBlur = 0; ctx.textBaseline = 'alphabetic';
        return lines.length * lineHeight; // 回傳佔據高度
    }

    // 左上角：加入主母插圖
    function drawDatePanel(ctx) {
        let panelW = 260; let panelH = 100;
        drawGlassPanel(ctx, 20, 20, panelW, panelH);
        
        // 主母頭像
        ctx.save();
        ctx.beginPath(); ctx.arc(65, 70, 32, 0, Math.PI * 2); ctx.clip();
        ctx.fillStyle = '#121826'; ctx.fill();
        mainCharacter.draw(ctx, 65, 90, 0.4, true); 
        ctx.restore();
        
        ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 2; 
        ctx.beginPath(); ctx.arc(65, 70, 32, 0, Math.PI*2); ctx.stroke();

        ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;
        ctx.fillStyle = '#d4af37'; ctx.font = 'bold 20px "Kaiti"'; ctx.textAlign = 'left'; 
        ctx.fillText(`【大宋宣和元年】`, 110, 55);
        ctx.fillStyle = '#e0e0e0'; ctx.font = '18px "Kaiti"'; 
        ctx.fillText(`產後第 ${currentDay} 天`, 120, 85);
        ctx.shadowBlur = 0;
    }

    // 右上角：加大頭像
    function drawStatsPanel(ctx) {
        let panelW = 340; let panelX = Math.max(20, cw - panelW - 20);
        let panelY = 20; let panelH = 320;
        
        drawGlassPanel(ctx, panelX, panelY, panelW, panelH);
        
        ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 4;
        ctx.fillStyle = '#d4af37'; ctx.font = 'bold 22px "Kaiti"'; ctx.textAlign = 'left';
        ctx.fillText("【後宅人際關係】", panelX + 20, panelY + 35); ctx.shadowBlur = 0;

        let startY = panelY + 80;
        for (const key in player.affections) {
            let stat = player.affections[key];
            stat.current += (stat.target - stat.current) * 10 * dt;
            
            let statusColor = '#e0e0e0';
            if(stat.target <= 20) statusColor = '#e74c3c'; 
            else if(['嫌隙', '心寒', '厭惡', '覺得荒唐', '心灰意冷', '瑟瑟發抖', '氣急敗壞', '慌張', '恐懼', '強烈厭惡', '疑惑', '擔憂'].includes(stat.status)) statusColor = '#e74c3c';
            else if(['崇拜', '崇敬', '死心塌地', '情同姐妹', '醫者父母心', '敬畏', '知音', '安心', '欣慰', '敬佩'].includes(stat.status)) statusColor = '#4caf50';

            let npc = npcs[key];
            if (npc) {
                let imgExpr = (statusColor === '#e74c3c') ? 'angry' : ((statusColor === '#4caf50') ? 'happy' : 'normal');
                npc.setEmotion(imgExpr);
                ctx.save();
                ctx.beginPath(); ctx.arc(panelX + 45, startY - 5, 26, 0, Math.PI * 2); ctx.clip();
                ctx.fillStyle = '#1a1f2e'; ctx.fill();
                // 放大 NPC 頭像
                npc.draw(ctx, panelX + 45, startY + 12, 0.35, true);
                ctx.restore();
                
                ctx.strokeStyle = '#d4af37'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(panelX + 45, startY - 5, 26, 0, Math.PI*2); ctx.stroke();
            }

            ctx.fillStyle = '#fff'; ctx.font = '18px "Kaiti"'; ctx.textAlign = 'left'; 
            ctx.fillText(`${stat.name}`, panelX + 85, startY - 12);
            ctx.fillStyle = statusColor; ctx.textAlign = 'right'; ctx.font = '16px "Kaiti"'; 
            ctx.fillText(`[${stat.status}]`, panelX + panelW - 20, startY - 12);
            
            ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.roundRect(panelX + 85, startY + 5, panelW - 105, 8, 4); ctx.fill();
            ctx.fillStyle = stat.color; 
            let barWidth = Math.max(0, (stat.current / stat.max) * (panelW - 105));
            ctx.beginPath(); ctx.roundRect(panelX + 85, startY + 5, barWidth, 8, 4); ctx.fill(); 
            ctx.shadowColor = stat.color; ctx.shadowBlur = 8; ctx.beginPath(); ctx.roundRect(panelX + 85, startY + 5, barWidth, 8, 4); ctx.fill(); ctx.shadowBlur = 0;

            startY += 60;
        }
    }

    // 完美自適應按鈕斷行
    function drawButton(ctx, id, btn, text) {
        let hover = (mouse.x >= btn.x && mouse.x <= btn.x + btn.w && mouse.y >= btn.y && mouse.y <= btn.y + btn.h);
        ctx.save();
        let bgGrad = ctx.createLinearGradient(0, btn.y, 0, btn.y + btn.h);
        if (hover) {
            bgGrad.addColorStop(0, 'rgba(212, 175, 55, 0.4)'); bgGrad.addColorStop(1, 'rgba(150, 110, 20, 0.2)');
            ctx.shadowColor = 'rgba(212, 175, 55, 0.6)'; ctx.shadowBlur = 15; canvas.style.cursor = 'pointer';
        } else {
            bgGrad.addColorStop(0, 'rgba(30, 35, 45, 0.9)'); bgGrad.addColorStop(1, 'rgba(15, 18, 25, 0.9)');
        }
        ctx.fillStyle = bgGrad; ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 6); ctx.fill();
        ctx.strokeStyle = hover ? '#fff' : '#d4af37'; ctx.lineWidth = hover ? 2 : 1; ctx.stroke();
        
        ctx.fillStyle = hover ? '#fff' : '#d4af37'; ctx.font = '20px "Kaiti"'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        
        let lines = wrapText(ctx, text, btn.w - 30);
        let startY = btn.y + btn.h/2 - ((lines.length - 1) * 12);
        lines.forEach((l, i) => {
            ctx.fillText(l, btn.x + btn.w/2, startY + i * 24);
        });

        ctx.restore();
        clickZones.push({ id: id, ...btn });
    }

    for(let i=0; i<40; i++) dustParticles.push(new DustParticle());

    function gameLoop(timestamp) {
        dt = (timestamp - lastTime) / 1000 || 0;
        lastTime = timestamp; time += dt;

        mouse.x += (mouse.targetX - mouse.x) * 10 * dt; mouse.y += (mouse.targetY - mouse.y) * 10 * dt;
        if (cameraShake.amount > 0.1) {
            cameraShake.x = (Math.random() - 0.5) * cameraShake.amount; cameraShake.y = (Math.random() - 0.5) * cameraShake.amount;
            cameraShake.amount *= 0.9;
        } else { cameraShake.x = 0; cameraShake.y = 0; }

        ctx.save();
        ctx.scale(dpr, dpr); 
        ctx.translate(cameraShake.x, cameraShake.y);

        // 1. 滿版無縫背景
        let bgGrad = ctx.createRadialGradient(cw/2, ch/2, 100, cw/2, ch/2, Math.max(cw, ch));
        bgGrad.addColorStop(0, '#151b29'); bgGrad.addColorStop(1, '#05070a');
        ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, cw, ch);

        ctx.globalCompositeOperation = 'screen';
        dustParticles.forEach(p => { p.update(dt); p.draw(ctx); });
        ctx.globalCompositeOperation = 'source-over';

        // 2. 更新所有角色
        mainCharacter.update(dt);
        Object.values(npcs).forEach(npc => npc.update(dt));
        
        // 自動切換當前對話角色
        let activeCharacter = mainCharacter;
        if (currentState === STATES.STORY || currentState === STATES.QUESTION || currentState === STATES.FEEDBACK) {
            let stage = currentStage || introStage;
            let charName = stage.character || "";
            if (charName.includes("春桃")) activeCharacter = npcs.maid;
            else if (charName.includes("總管")) activeCharacter = npcs.chef;
            else if (charName.includes("張大人") || charName.includes("太醫")) activeCharacter = npcs.doctor;
            else if (charName.includes("蘇氏") || charName.includes("醫女")) activeCharacter = npcs.medic;
        }

        // 動態立繪尺寸 (在手機縮小，電腦放大)
        let charScale = Math.max(1.0, Math.min(cw/600, ch/800) * 2.2);
        activeCharacter.draw(ctx, cw/2, ch/2 + 100, charScale);

        // 3. UI 響應式渲染
        clickZones = [];
        canvas.style.cursor = 'crosshair'; 
        
        let boxW = Math.min(800, cw - 40);
        let boxX = cw / 2 - boxW / 2;

        if (currentState === STATES.START) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,cw,ch);
            ctx.textAlign = 'center'; ctx.shadowColor = '#d4af37'; ctx.shadowBlur = 20;
            ctx.fillStyle = '#fff'; 
            let titleSize = Math.max(30, Math.min(60, cw * 0.08));
            ctx.font = `bold ${titleSize}px "Kaiti"`; ctx.fillText("汴京娘子調養記", cw/2, ch/2 - 100); ctx.shadowBlur = 0;
            ctx.fillStyle = '#d4af37'; ctx.font = `${titleSize*0.45}px "Kaiti"`; ctx.fillText("— 獨立角色極限渲染版 —", cw/2, ch/2 - 40);
            drawButton(ctx, 'btn_start', {x: cw/2 - 100, y: ch/2 + 80, w: 200, h: 60}, "進入侯府");
        }
        else if (currentState === STATES.STORY) {
            drawDatePanel(ctx); drawStatsPanel(ctx);
            let stage = currentStage || introStage; let text = stage.story[currentStoryLine];
            
            // 動態計算對話框高度
            ctx.font = '20px "Kaiti"';
            let requiredH = wrapText(ctx, text, boxW - 50).length * 30 + 100;
            let boxH = Math.max(180, requiredH);
            let boxY = ch - boxH - 30;

            drawGlassPanel(ctx, boxX, boxY, boxW, boxH);
            let yOffset = drawCinematicText(ctx, `【${stage.character}】`, boxX + 25, boxY + 30, boxW - 50, true);
            drawCinematicText(ctx, text, boxX + 25, boxY + 30 + yOffset, boxW - 50);
            
            ctx.globalAlpha = (Math.sin(time * 5) + 1) * 0.5;
            ctx.fillStyle = '#d4af37'; ctx.textAlign = 'right'; ctx.font = 'bold 16px "Kaiti"'; 
            ctx.fillText("▼ 點擊繼續", boxX + boxW - 20, boxY + boxH - 20);
            ctx.globalAlpha = 1.0;
            clickZones.push({ id: 'screen_next', x: 0, y: 0, w: cw, h: ch }); 
        }
        else if (currentState === STATES.QUESTION) {
            drawDatePanel(ctx); drawStatsPanel(ctx);
            let stage = currentStage || introStage;
            
            // 計算題目高度
            ctx.font = 'bold 24px "Kaiti"';
            let titleH = wrapText(ctx, stage.question, boxW - 50).length * 34 + 60;
            
            // 計算每個按鈕高度
            ctx.font = '20px "Kaiti"';
            let btnHs = stage.options.map(opt => wrapText(ctx, opt.text, boxW - 70).length * 24 + 30);
            let totalBtnH = btnHs.reduce((a,b)=>a+b, 0) + 40; // 間距
            
            let boxY = ch - titleH - totalBtnH - 40;
            drawGlassPanel(ctx, boxX, boxY, boxW, titleH + totalBtnH + 20);
            
            drawCinematicText(ctx, stage.question, boxX + 25, boxY + 30, boxW - 50, true);
            
            let currentBtnY = boxY + titleH;
            let btnW = boxW - 40; let btnX = boxX + 20;
            
            stage.options.forEach((opt, idx) => {
                let h = btnHs[idx];
                drawButton(ctx, `opt_${idx}`, {x: btnX, y: currentBtnY, w: btnW, h: h}, opt.text);
                currentBtnY += h + 15;
            });
        }
        else if (currentState === STATES.FEEDBACK) {
            drawDatePanel(ctx); drawStatsPanel(ctx);
            
            ctx.font = '20px "Kaiti"';
            let requiredH = wrapText(ctx, selectedOptionFeedback, boxW - 50).length * 30 + 100;
            let boxH = Math.max(180, requiredH);
            let boxY = ch - boxH - 30;

            drawGlassPanel(ctx, boxX, boxY, boxW, boxH);
            let yOffset = drawCinematicText(ctx, "【調理結果】", boxX + 25, boxY + 30, boxW - 50, true);
            drawCinematicText(ctx, selectedOptionFeedback, boxX + 25, boxY + 30 + yOffset, boxW - 50);
            
            ctx.globalAlpha = (Math.sin(time * 5) + 1) * 0.5;
            ctx.fillStyle = '#d4af37'; ctx.textAlign = 'right'; ctx.font = 'bold 16px "Kaiti"'; 
            ctx.fillText("▼ 點擊繼續", boxX + boxW - 20, boxY + boxH - 20);
            ctx.globalAlpha = 1.0;
            clickZones.push({ id: 'screen_next', x: 0, y: 0, w: cw, h: ch });
        }
        else if (currentState === STATES.END) {
            ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,cw,ch);
            ctx.textAlign = 'center'; ctx.fillStyle = '#d4af37'; ctx.font = 'bold 46px "Kaiti"'; ctx.fillText("體驗結束", cw/2, ch/2 - 100);
            ctx.fillStyle = '#fff'; ctx.font = '24px "Kaiti"'; ctx.fillText(`最終知識分數: ${player.knowledgeScore}`, cw/2, ch/2 - 30);
            drawButton(ctx, 'btn_restart', {x: cw/2 - 100, y: ch/2 + 60, w: 200, h: 60}, "重新體驗");
        }

        floatingTexts = floatingTexts.filter(t => t.life > 0); floatingTexts.forEach(t => { t.update(); t.draw(ctx); });

        if (bloomIntensity > 0) {
            ctx.globalCompositeOperation = 'screen'; ctx.fillStyle = `rgba(255, 255, 255, ${bloomIntensity * 0.3})`;
            ctx.fillRect(0, 0, cw, ch); bloomIntensity -= dt * 2; ctx.globalCompositeOperation = 'source-over';
        }

        ctx.restore();
        requestAnimationFrame(gameLoop);
    }

    // 互動處理
    function handleInteraction(cx, cy) {
        let clicked = clickZones.find(z => cx >= z.x && cx <= z.x + z.w && cy >= z.y && cy <= z.y + z.h);
        
        if (currentState === STATES.START && clicked && clicked.id === 'btn_start') {
            currentStage = introStage; mainCharacter.setEmotion('normal'); currentState = STATES.STORY;
        }
        else if (currentState === STATES.STORY && clicked && clicked.id === 'screen_next') {
            currentStoryLine++;
            if (currentStoryLine >= currentStage.story.length) currentState = STATES.QUESTION;
        }
        else if (currentState === STATES.QUESTION && clicked && clicked.id.startsWith('opt_')) {
            let idx = parseInt(clicked.id.split('_')[1]);
            applyChoice(currentStage.options[idx]);
        }
        else if (currentState === STATES.FEEDBACK && clicked && clicked.id === 'screen_next') {
            currentDay++; currentStoryLine = 0;
            if (currentDay > 2) { 
                currentState = STATES.END; mainCharacter.setEmotion('happy');
            } else {
                currentStage = originStages['名門嫡女']; mainCharacter.setEmotion('normal'); currentState = STATES.STORY;
            }
        }
        else if (currentState === STATES.END && clicked && clicked.id === 'btn_restart') {
            currentDay = 1; player.knowledgeScore = 50;
            for(let key in player.affections) {
                player.affections[key].target = 50; player.affections[key].current = 50; player.affections[key].status = "平淡";
            }
            currentStage = introStage; currentStoryLine = 0; mainCharacter.setEmotion('normal'); currentState = STATES.STORY;
        }
    }

    canvas.addEventListener('mousedown', e => {
        let rect = canvas.getBoundingClientRect();
        handleInteraction((e.clientX - rect.left) * (cw / rect.width), (e.clientY - rect.top) * (ch / rect.height));
    });
    
    canvas.addEventListener('touchstart', e => { 
        e.preventDefault(); 
        let rect = canvas.getBoundingClientRect();
        let cx = (e.touches[0].clientX - rect.left) * (cw / rect.width);
        let cy = (e.touches[0].clientY - rect.top) * (ch / rect.height);
        mouse.targetX = cx; mouse.targetY = cy;
        handleInteraction(cx, cy); 
    }, {passive: false});

    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
